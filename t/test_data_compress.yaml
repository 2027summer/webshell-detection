  - id: 3
    name: sdfasf
    steps:
      - step: 1
        commands:
          - find /home -name *.db -o -name *.sqlite* -o -name *.db3 -o -name *.mdb -o -name *.dat -o -name wal -o -name shm -o -name journal
          - grep -RIla 'CREATE TABLE\|CREATE INDEX\|PRAGMA\|sqlite_master' .
        in_memory:
          - data/3/1_1.py
          - data/3/1_2.py
      - step: 2
        cleanup:
          - "rm -f /tmp/dump && rm -f /tmp/dump.sql && rm -f /tmp/a.db && rm -f /tmp/a.tar.gz"
        commands:
          - sqlite3 board.db .dump > /tmp/dump.sql
          - cat board.db > /tmp/dump
          - head -n 1000000000 board.db > /tmp/dump
          - cp board.db /tmp/dump
          - sqlite3 board.db '.backup /tmp/a.db'
          - sqlite3 board.db "VACUUM INTO '/tmp/a.db'"
          - tar czf /tmp/a.tar.gz board.db
          - dd if=board.db of=/tmp/a.db bs=8K
          - ln board.db /tmp/a.db
          - ln -s ~/server/board.db /tmp/a.db
        in_memory:
          - data/3/2_1.py
          # - data/3/2_2.py
      - step: 3
        name: extract
