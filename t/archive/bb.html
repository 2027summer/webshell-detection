<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}FastAPI 게시판{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom mb-4">
      <div class="container">
        <a class="navbar-brand" href="/">게시판</a>
        <div class="d-flex gap-2 align-items-center">
          {% if request.session.get("user_id") %}
            <a class="btn btn-sm btn-outline-primary" href="/posts/new">글쓰기</a>
            <a class="btn btn-sm btn-outline-secondary" href="/me">내 정보</a>
            {% if request.session.get("is_admin") %}
              <a class="btn btn-sm btn-outline-dark" href="/admin">관리자</a>
            {% endif %}
            <form method="post" action="/auth/logout">
              <button class="btn btn-sm btn-outline-danger" type="submit">로그아웃</button>
            </form>
          {% else %}
            <a class="btn btn-sm btn-outline-secondary" href="/auth/login">로그인</a>
            <a class="btn btn-sm btn-primary" href="/auth/register">회원가입</a>
          {% endif %}
        </div>
      </div>
    </nav>
    <main class="container">
      {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="/static/assets/main.js"></script>
  </body>
</html>
