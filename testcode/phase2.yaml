rules:
  - name: unapproved_cp_path
    type: cp_path_policy
    timeout_ns: 1000000000
    source:
      allow:
        - path_in: /home/victim/server/static/uploads/
    destination:
      allow:
        - starts_with: /tmp/user-export-3-

  - name: unapproved_zip_path
    type: zip_path_policy
    timeout_ns: 1000000000
    archive:
      allow:
        - starts_with: /tmp/user-export-3-
    input:
      allow:
        - starts_with: /tmp/user-export-3-

  - name: unapproved_tar_path
    type: tar_path_policy
    timeout_ns: 1000000000
    archive:
      allow:
        - path_in: /
    input:
      deny:
        - path_in: /home/victim/server/

