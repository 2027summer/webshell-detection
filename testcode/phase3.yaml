rules:
  - name: unapproved_file_tool_use
    timeout_ns: 1000000000 
    transitions:
      - syscall: execve
        filename:
          deny:
            - ends_with: /find
            - ends_with: /grep
            - ends_with: /ls
            - ends_with: /cat
            - ends_with: /tail
            - ends_with: /head
            - ends_with: /wc
            - ends_with: /awk
            - ends_with: /sed
            - ends_with: /cut
            - ends_with: /sort
            - ends_with: /uniq
            - ends_with: /tr
            - ends_with: /xargs
            - ends_with: /xxd
            - ends_with: /hexdump
            - ends_with: /busybox
            - ends_with: /strings
      - syscall: openat
        flags_unset:
          - O_DIRECTORY
        access_mode: read
        pathname:
          deny:
            - path_in: /home/victim/server
            - path_in: /home/victim/server/
            - path_in: /home/victim/.ssh/

